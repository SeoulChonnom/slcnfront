version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: 'Asia/Seoul'

    open-pull-requests-limit: 5

    groups:
      production-minor-patch:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch

      development-minor-patch:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch

    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-patch-days: 3
      semver-major-days: 30
